<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adrian Rebek // Menu</title>
  <style>
    :root {
      --bg: #050508;
      --fg: #ffffff;
      --accent: #ff3344;
      --card-bg: rgba(10, 12, 18, 0.65);
      --border: rgba(255, 255, 255, 0.06);
      --text-muted: #949eac;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Subtle ambient background glow */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255, 51, 68, 0.03);
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
    }

    .menu-container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .profile-header {
      margin-bottom: 40px;
    }

    .profile-header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .profile-header p {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .menu-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .menu-item {
      display: block;
      text-decoration: none;
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 24px;
      border-radius: 16px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .menu-item h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 4px;
      transition: color 0.2s ease;
    }

    .menu-item p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Hover states */
    .menu-item:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 51, 68, 0.3);
      background: rgba(15, 18, 26, 0.8);
      box-shadow: 0 15px 35px rgba(255, 51, 68, 0.05);
    }

    .menu-item:hover h2 {
      color: var(--accent);
    }

    /* Active touch response for mobile */
    .menu-item:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .profile-header h1 { font-size: 28px; }
      .menu-item { padding: 20px; }
      .menu-item h2 { font-size: 16px; }
      .menu-item p { font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="menu-container">
    <header class="profile-header">
      <h1>Adrian Rebek</h1>
      <p>Spazio Visivo // Portfolio</p>
    </header>

    <nav class="menu-grid">
      <a href="video.html" class="menu-item">
        <h2>Video</h2>
        <p>Montaggio, post-produzione e color grading cinematografico.</p>
      </a>

      <a href="fotografie.html" class="menu-item">
        <h2>Fotografie</h2>
        <p>Esplorazione visiva digitale e sviluppo analogico chimico.</p>
      </a>

      <a href="chi-sono.html" class="menu-item">
        <h2>Chi Sono</h2>
        <p>Informazioni sul percorso professionale, contatti e hardware lab.</p>
      </a>
    </nav>
  </div>

</body>
</html>
